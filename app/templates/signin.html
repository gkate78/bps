<!DOCTYPE html>
<html>
<head><title>Sign In</title></head>
<body>
<h1>Sign In</h1>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
<form method="post" action="/auth/signin">
  <input name="phone" placeholder="Phone" value="{{ phone or '' }}">
  <input name="pin" type="password" placeholder="4-digit PIN">
  <button type="submit">Sign In</button>
</form>
<form method="get" action="/auth/signup"><button>Sign Up</button></form>
</body>
</html>
